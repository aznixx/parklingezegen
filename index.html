<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Lingezegen - Boomsoorten</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <!-- Mode Selector Screen -->
    <div id="modeSelector" class="mode-selector">
      <div class="mode-selector__content">
        <div class="mode-selector__header">
          <div class="mode-selector__logo">
            <img src="./public/previews/logo-park-lingezegen.svg" alt="Park Lingezegen" class="park-logo">
          </div>
          <p class="mode-selector__subtitle">Kies uw modus</p>
        </div>
        
        <div class="mode-selector__options">
          <button class="mode-card mode-card--visitor" id="visitorMode">
            <div class="mode-card__header">
              <div class="mode-card__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
              </div>
              <h2 class="mode-card__title">Bezoeker</h2>
            </div>
            <p class="mode-card__description">Verken het park en ontdek de boomsoorten</p>
            <ul class="mode-card__features">
              <li>
                <span class="feature-icon">🗺️</span>
                <span>Interactieve kaart</span>
              </li>
              <li>
                <span class="feature-icon">📖</span>
                <span>Uitgebreide informatie</span>
              </li>
              <li>
                <span class="feature-icon">📸</span>
                <span>Foto's en details</span>
              </li>
            </ul>
          </button>
          
          <button class="mode-card mode-card--staff" id="staffMode">
            <div class="mode-card__header">
              <div class="mode-card__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
              </div>
              <h2 class="mode-card__title">Medewerker</h2>
            </div>
            <p class="mode-card__description">Beheer en bewerk zones</p>
            <ul class="mode-card__features">
              <li>
                <span class="feature-icon">⚙️</span>
                <span>Admin tools</span>
              </li>
              <li>
                <span class="feature-icon">✏️</span>
                <span>Zones bewerken</span>
              </li>
              <li>
                <span class="feature-icon">📊</span>
                <span>Statistieken</span>
              </li>
            </ul>
            <div class="mode-card__badge">Wachtwoord vereist</div>
          </button>
        </div>
      </div>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="password-modal">
      <div class="password-modal__content">
        <div class="password-modal__icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h2 class="password-modal__title">Medewerker Toegang</h2>
        <p class="password-modal__description">Voer het wachtwoord in voor medewerker modus</p>
        <input type="password" id="passwordInput" class="password-modal__input" placeholder="Wachtwoord">
        <div class="password-modal__error" id="passwordError"></div>
        <div class="password-modal__buttons">
          <button class="password-modal__btn password-modal__btn--cancel" id="cancelPassword">Annuleren</button>
          <button class="password-modal__btn password-modal__btn--confirm" id="confirmPassword">Bevestigen</button>
        </div>
      </div>
    </div>

    <div id="map"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
